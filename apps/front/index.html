    <style>
      .loading {
        position: fixed;
        z-index: -999;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(255, 255, 255, 0.8);
      }
      .loading::after {
        content: '';
        width: 50px;
        height: 50px;
        border: 3px solid rgba(0, 0, 0, 0.2);
        border-top-color: #3b82f6;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
